name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Package plugin
        shell: pwsh
        run: |
          mkdir dist
          mkdir tmp
          Copy-Item -Recurse .claude-plugin tmp\.claude-plugin
          Copy-Item marketplace.json tmp\marketplace.json
          Copy-Item -Recurse hooks tmp\hooks
          Copy-Item -Recurse assets tmp\assets
          Copy-Item PLUGIN.md tmp\
          Copy-Item README.md tmp\
          Copy-Item target\release\agent-critter.exe tmp\
          Compress-Archive -Path tmp\* -DestinationPath dist\agent-critter-plugin-windows.zip -Force
          Remove-Item -Recurse tmp

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-windows
          path: dist/agent-critter-plugin-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Package plugin
        run: |
          mkdir -p dist tmp
          cp -r .claude-plugin tmp/
          cp marketplace.json tmp/marketplace.json
          cp -r hooks tmp/
          cp -r assets tmp/
          cp PLUGIN.md tmp/
          cp README.md tmp/
          cp target/release/agent-critter tmp/
          cd tmp && zip -r ../dist/agent-critter-plugin-macos.zip . && cd ..

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-macos
          path: dist/agent-critter-plugin-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agent-critter-windows/agent-critter-plugin-windows.zip
            artifacts/agent-critter-macos/agent-critter-plugin-macos.zip
