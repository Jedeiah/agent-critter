name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release
      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-macos-bin
          path: target/release/agent-critter
      - name: Package plugin zip
        run: |
          mkdir -p dist tmp
          cp -r .claude-plugin tmp/
          cp .claude-plugin/marketplace.json tmp/
          cp -r hooks tmp/
          cp -r assets tmp/
          cp PLUGIN.md tmp/
          cp README.md tmp/
          mkdir -p tmp/bin
          cp target/release/agent-critter tmp/bin/
          cd tmp && zip -r ../dist/agent-critter-plugin-macos.zip . && cd ..
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-macos
          path: dist/agent-critter-plugin-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release
        run: cargo build --release
      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-windows-bin
          path: target/release/agent-critter.exe
      - name: Package plugin zip
        shell: pwsh
        run: |
          mkdir dist
          mkdir tmp
          Copy-Item -Recurse .claude-plugin tmp\.claude-plugin
          Copy-Item .claude-plugin\marketplace.json tmp\marketplace.json
          Copy-Item -Recurse hooks tmp\hooks
          Copy-Item -Recurse assets tmp\assets
          Copy-Item PLUGIN.md tmp\
          Copy-Item README.md tmp\
          New-Item -ItemType Directory -Force tmp\bin
          Copy-Item target\release\agent-critter.exe tmp\bin\agent-critter.exe
          Compress-Archive -Path tmp\* -DestinationPath dist\agent-critter-plugin-windows.zip -Force
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-critter-windows
          path: dist/agent-critter-plugin-windows.zip

  deploy:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download macos binary
        uses: actions/download-artifact@v4
        with:
          name: agent-critter-macos-bin
          path: /tmp/macos
      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: agent-critter-windows-bin
          path: /tmp/windows
      - name: Commit binaries to bin/
        run: |
          cp /tmp/macos/agent-critter bin/agent-critter
          cp /tmp/windows/agent-critter.exe bin/agent-critter.exe
          chmod +x bin/agent-critter
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f bin/
          git diff --staged --quiet || (git commit -m "ci: deploy binaries" && git pull --rebase -X theirs origin main && git push)
          # Update SHA to point to this deploy commit
          sed -i "s/\"sha\": \"[a-f0-9]*\"/\"sha\": \"$(git rev-parse HEAD)\"/" .claude-plugin/marketplace.json
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet || (git commit -m "ci: update sha" && git pull --rebase -X theirs origin main && git push)

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agent-critter-macos/agent-critter-plugin-macos.zip
            artifacts/agent-critter-windows/agent-critter-plugin-windows.zip
